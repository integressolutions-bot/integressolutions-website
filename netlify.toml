   [build]
  command = "npm run build"
  publish = ".next"

# PSID – frontend /api/psid/* → backend /api/mobile/psid/*
[[redirects]]
  from = "/api/psid/*"
  to = "https://integres-backend-production.up.railway.app/api/mobile/psid/:splat"
  status = 200
  force = true

# Blacklist – frontend /api/blacklist/* → backend /api/mobile/blacklist/*
[[redirects]]
  from = "/api/blacklist/*"
  to = "https://integres-backend-production.up.railway.app/api/mobile/blacklist/:splat"
  status = 200
  force = true

# Practitioner – frontend /api/practitioner/* → backend /api/practitioner/*
# (if practitioner is a separate app, not under blacklist)
[[redirects]]
  from = "/api/practitioner/*"
  to = "https://integres-backend-production.up.railway.app/api/practitioner/:splat"
  status = 200
  force = true

# Fallback for any other /api/* (auth, admin, etc.)
[[redirects]]
  from = "/api/*"
  to = "https://integres-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Security headers (optional)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"