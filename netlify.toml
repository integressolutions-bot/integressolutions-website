 [build]
  command = "npm run build"
  publish = ".next"

# 1. PSID routes (frontend /api/psid/* -> backend /api/mobile/psid/*)
[[redirects]]
  from = "/api/psid/*"
  to = "https://integres-backend-production.up.railway.app/api/mobile/psid/:splat"
  status = 200
  force = true

# 2. Blacklist routes (frontend /api/blacklist/* -> backend /api/mobile/blacklist/*)
[[redirects]]
  from = "/api/blacklist/*"
  to = "https://integres-backend-production.up.railway.app/api/mobile/blacklist/:splat"
  status = 200
  force = true

# 3. Practitioner routes (frontend /api/practitioner/* -> backend /api/practitioner/*)
[[redirects]]
  from = "/api/practitioner/*"
  to = "https://integres-backend-production.up.railway.app/api/practitioner/:splat"
  status = 200
  force = true

# 4. General fallback for other /api/* (auth, admin, etc.)
[[redirects]]
  from = "/api/*"
  to = "https://integres-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

# 5. Security headers (optional)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"